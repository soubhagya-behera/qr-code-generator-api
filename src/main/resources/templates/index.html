<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>

    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">

    <h1>⚡ QR Code Generator</h1>

    <p>Create QR codes instantly from text or URLs</p>

    <input
        type="text"
        id="textInput"
        placeholder="Enter URL, text, email, phone number...">

      

    <button onclick="generateQR()">
        🚀 Generate QR Code
    </button>

    <div id="result">

        <img id="qrImage" alt="QR Code">

        <div class="button-group">

    <a
            id="downloadBtn"
            download="qrcode.png">
        📥 Download QR
    </a>

    <button onclick="clearQR()">
        🗑 Clear
    </button>

</div>

    </div>

    <p class="footer">
    Built with Java, Spring Boot & ZXing
</p>

</div>


<script src="/js/script.js"></script>

</body>
</html>
