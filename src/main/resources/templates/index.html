<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>QR Code Generator & Scanner</title>

    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>

    <div class="main-container">
      <div class="panel">
        <h1>⚡ QR Generator</h1>

        <p>Generate QR from text or URL</p>

        <input type="text" id="textInput" placeholder="Enter URL, Text, Email or Phone" />

        <button onclick="generateQR()">🚀 Generate QR</button>

        <div id="result">
          <img id="qrImage" alt="QR Code" />

          <div class="button-group">
            <a id="downloadBtn" download="qrcode.png"> 📥 Download </a>

            <button onclick="clearQR()">🗑 Clear</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <h1>🔍 QR Scanner</h1>

        <p>Upload a QR image</p>

        <input type="file" id="qrFile" />

        <button onclick="scanQR()">Scan QR</button>

        <div id="scanResult">
          <h3>Scan Result</h3>

          <p id="qrType"></p>

          <p id="qrContent"></p>

          <div class="scan-buttons">
            <button onclick="copyContent()">📋 Copy Content</button>

            <a id="openLink" target="_blank" style="display: none">
              🌐 Open Link
            </a>
          </div>
        </div>
      </div>
    </div>

    <div id="toast"></div>

    <script src="/js/script.js"></script>
  </body>
</html>
